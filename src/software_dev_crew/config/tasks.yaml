code_task:
  description: >
    你将根据以下需求创建一个软件项目：

    项目类型：{project_type}
    需求说明：
    ------------
    {requirements}
    
    请根据项目需求自主选择最合适的编程语言、框架和技术栈。
    创建完整的、可用于生产环境的代码，包含：
    - 适当的项目结构和文件组织
    - 完善的错误处理和边界情况处理
    - 清晰的代码注释和文档说明
    - 必要的依赖配置文件（如 package.json、requirements.txt、go.mod 等）
    - 使用说明和运行方法
    
  expected_output: >
    你的最终答案必须包含完整的源代码和配置文件。
    在代码开头用注释说明选择的技术栈和原因。
    只输出代码内容，不要有其他解释性文字。

review_task:
  description: >
    审查以下项目的代码：

    项目类型：{project_type}
    需求说明：
    ------------
    {requirements}

    使用你收到的代码，根据其使用的编程语言和框架，全面检查以下内容：
    - 逻辑错误和边界情况处理
    - 语法错误和缺失的导入/依赖
    - 变量声明、类型安全和内存管理
    - 代码格式、缩进和风格一致性
    - 安全漏洞（注入攻击、XSS、CSRF、权限控制等）
    - 性能问题和资源泄漏
    - 是否符合该语言和框架的最佳实践
    - 技术栈选择是否合理
    
  expected_output: >
    你的最终答案必须是完整的修正后的代码，包含所有必要的文件。
    只输出代码内容，不要有其他解释性文字。

evaluate_task:
  description: >
    对软件项目进行最终评估：

    项目类型：{project_type}
    需求说明：
    ------------
    {requirements}
    
    输出目录：{output_dir}

    验证代码是否：
    - 满足所有指定的需求和功能
    - 完整且可用于生产环境
    - 技术栈选择合理且适合项目需求
    - 遵循所用语言和框架的最佳实践
    - 具有完善的错误处理和边界情况处理
    - 代码结构清晰、易于理解和维护
    - 包含必要的文档、注释和使用说明
    - 包含依赖配置文件和运行说明
    
    验证代码正确后，你必须使用 File Writer 工具将所有项目文件保存到指定的输出目录中。
    
    对于多文件项目（如 Web 应用），请保存所有必要的文件：
    - 前端文件（HTML、CSS、JS/TS、组件等）
    - 后端文件（API 路由、模型、配置等）
    - 配置文件（package.json、requirements.txt、.env.example 等）
    - 文档文件（README.md、使用说明等）
    
    文件路径格式：{output_dir}/文件名
    例如：{output_dir}/main.py 或 {output_dir}/frontend/App.tsx
    
    根据项目类型和所用语言选择合适的文件结构：
    - 单文件项目：直接保存到输出目录
    - 多文件项目：创建合理的子目录结构（frontend/、backend/、src/ 等）
  expected_output: >
    你的最终答案必须是完整的源代码，包含所有必要的文件内容。
    只输出代码内容，不要有其他解释性文字。
    你还必须确认已使用 File Writer 工具将代码保存到文件中。