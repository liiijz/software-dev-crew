requirements_analysis_task:
  description: >
    分析以下用户需求，制定详细的产品规格和技术方案：

    项目类型：{project_type}
    用户需求：
    ------------
    {requirements}
    
    请完成以下工作：
    1. 需求分析：深入理解用户需求，明确核心功能点和使用场景
    2. 技术选型：根据项目类型推荐最合适的编程语言、框架和技术栈，并说明选择理由
    3. 架构设计：设计合理的项目结构和模块划分
    4. 功能规格：列出详细的功能清单和实现要求
    5. 质量标准：定义代码质量、性能、安全性等方面的要求
    
  expected_output: >
    输出详细的产品规格文档，包含：
    - 需求分析和功能清单
    - 推荐的技术栈及选择理由
    - 项目架构和文件结构设计
    - 开发规范和质量标准
    格式清晰，便于工程师理解和实现。

development_task:
  description: >
    根据产品规格实现软件项目：

    项目类型：{project_type}
    用户需求：
    ------------
    {requirements}
    
    请严格按照产品经理提供的产品规格和技术方案进行开发。
    创建完整的、可用于生产环境的代码，包含：
    - 按照推荐的技术栈和架构进行实现
    - 实现所有功能规格中定义的功能
    - 适当的项目结构和文件组织
    - 完善的错误处理和边界情况处理
    - 清晰的代码注释和文档说明
    - 必要的依赖配置文件（如 package.json、requirements.txt、go.mod 等）
    - README.md 包含使用说明和运行方法
    
  expected_output: >
    你的最终答案必须包含完整的源代码和配置文件。
    只输出代码内容，不要有其他解释性文字。

qa_review_task:
  description: >
    对软件项目进行全面的质量审查和验收：

    项目类型：{project_type}
    用户需求：
    ------------
    {requirements}
    
    输出目录：{output_dir}

    请完成以下审查工作：
    
    1. 代码审查：
       - 检查语法错误、缺失的导入/依赖
       - 审查安全漏洞（SQL 注入、XSS、CSRF 等）
       - 检查性能问题和资源泄漏
       - 验证代码规范和最佳实践
    
    2. 功能验证：
       - 确保实现了产品规格中的所有功能
       - 验证错误处理和边界情况
       - 检查用户体验和交互逻辑
    
    3. 文档检查：
       - 确保包含完整的 README.md
       - 验证依赖配置文件完整
       - 检查代码注释和使用说明
    
    4. 问题修复（如需要）：
       如果发现任何问题，请委托给软件工程师进行修复。
       明确指出需要修复的问题，然后等待工程师修复后重新审查。
       可以进行多轮审查，直到代码完全符合质量标准。
    
    5. 产品交付：
       验证通过后，使用 File Writer 工具将所有项目文件保存到指定的输出目录.
       
       **重要**：保存文件前，必须先创建必要的目录结构.
       File Writer 工具不会自动创建父目录，所以需要按以下步骤操作：
       
       步骤 1：规划目录结构
       - 单文件项目：直接保存到 {output_dir}
       - 多文件项目：设计合理的子目录（如 frontend/、backend/、src/ 等）
       
       步骤 2：创建目录
       - 使用 File Writer 工具的 directory 参数创建目录
       - 或者先保存一个占位文件来创建目录路径
       
       步骤 3：保存所有文件
       - 前端文件（HTML、CSS、JS/TS、组件等）
       - 后端文件（API 路由、模型、配置等）
       - 配置文件（package.json、requirements.txt、.env.example 等）
       - 文档文件（README.md、使用说明等）
       
       文件路径格式：{output_dir}/文件名
       例如：{output_dir}/README.md 或 {output_dir}/frontend/src/App.tsx
       
       **提示**：如果遇到 "No such file or directory" 错误，说明父目录不存在，
       需要先创建目录或调整文件保存顺序（先保存根目录文件，再保存子目录文件）.
    
  expected_output: >
    你的最终答案必须包含：
    1. 审查报告（如有问题需说明）
    2. 修正后的完整源代码
    3. 确认已将所有文件保存到指定目录
    只输出代码内容，不要有其他解释性文字.
    只输出代码内容，不要有其他解释性文字。